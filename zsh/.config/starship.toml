format = """
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$all\
$fill\
$sudo \
$time \
$battery
$os \
$hostname\
$container\
$character

"""
# $docker_context
# $hostname\
# $localip


right_format = '' # Don't Like how it formated

# All Default
scan_timeout = 30
command_timeout = 500
add_newline = true
follow_symlinks = true


[battery]
format = '[$symbol$percentage]($style)'
full_symbol = '¾░ü╣ '
charging_symbol = '¾░éä '
discharging_symbol = '¾░ü¢ '
unknown_symbol = '¾░éâ '
empty_symbol = '¾░éÄ '

[[battery.display]]
threshold = 30
style = 'bold Red'
[[battery.display]]
threshold = 50
style = 'bold Yellow'
[[battery.display]]
threshold = 100           #Changed on Desktop?
style = 'bold Green'
discharging_symbol = '¾░ü╣ '

[time]
format = '[$time]($style) '
disabled = false

[character]
success_symbol = '[>](bold green) '
error_symbol = '[>](bold green) '

vimcmd_symbol = '[<](bold green)'
vimcmd_replace_one_symbol = '[<](bold purple)'
vimcmd_replace_symbol = '[<](bold purple)'
vimcmd_visual_symbol = '[<](bold yellow)'

[container]
style = 'blue dimmed'
disabled = true       #Here for WSL
symbol = "´îê "

[directory]
truncation_length = 3
truncate_to_repo = false
truncation_symbol = 'ÔÇĞ/'
use_os_path_sep = true
read_only = " ¾░î¥"
read_only_style = 'bold blue'

[docker_context]
only_with_files = false
symbol = "´îê "

[fill]
symbol = ' '

[line_break]
disabled = true

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
symbol = "´Éİ "
always_show_remote = false

[git_commit]
tag_symbol = ' ´ÉÆ '

[git_status] #Needs to be tested
format = '([$ahead_behind]($style))'
disabled = false

[hostname]
format = '[$ssh_symbol]($style) '
ssh_only = true
ssh_symbol = "¯¼ü "
style = 'dimmed cyan'

[localip]
ssh_only = false

[os]
disabled = true
style = 'blue'

[python]
symbol = "¯êÁ "

[sudo]
format = '[sudo]($style)'
style = 'bold red dimmed'
disabled = false

[username]
format = '[$user]($style)'
show_always = false
disabled = true


